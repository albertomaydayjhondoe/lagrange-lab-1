name: Deploy to Vercel + Supabase

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VITE_SUPABASE_URL: https://naikdjreibbugblihgwl.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ZeZ0R4rQpNbvhEfHMjtQrQ_BrjDJXrc
  VITE_SUPABASE_PROJECT_ID: Naikdjreibbugblihgwl

jobs:
  deploy-vercel:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ env.VITE_SUPABASE_PROJECT_ID }}

      - name: Deploy to Vercel
        run: |
          npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-supabase-functions:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        run: npm install -g supabase

      - name: Link Supabase Project
        run: npx supabase link --project-ref Naikdjreibbugblihgwl
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          npx supabase functions deploy ingest-source --no-verify-jwt
          npx supabase functions deploy tutoring-oracle --no-verify-jwt
          npx supabase functions deploy save-dialogue --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_GATEWAY_URL: ${{ secrets.AI_GATEWAY_URL }}
          AI_CHAT_MODEL: ${{ secrets.AI_CHAT_MODEL }}
          AI_EMBEDDING_MODEL: ${{ secrets.AI_EMBEDDING_MODEL }}

      - name: Push Migrations
        run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
