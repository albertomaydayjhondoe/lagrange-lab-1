<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA fallback - redirect all 404s to index.html
    var path = window.location.pathname;
    var search = window.location.search;
    // Use the repo path
    window.location.replace('/lagrange-lab-1/' + path + search);
  </script>
</head>
<body>
  <p>Redirecting to <a id="link"></a>...</p>
  <script>
    document.getElementById('link').href = '/lagrange-lab-1/' + window.location.pathname + window.location.search;
  </script>
</body>
</html>
