<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Lagrange Lab</title>
  <script>
    // GitHub Pages SPA fallback - store path and redirect to app with hash
    var path = window.location.pathname + window.location.search;
    // Remove the base repo path from the URL
    var basePath = '/lagrange-lab-1';
    var cleanPath = path.replace(basePath, '') || '/';
    // Store just the route part
    sessionStorage.setItem('lagrange_route', cleanPath);
    // Redirect to app root with hash
    window.location.replace(basePath + '/#' + cleanPath);
  </script>
</head>
<body>
  <p>Loading Lagrange Lab...</p>
</body>
</html>
